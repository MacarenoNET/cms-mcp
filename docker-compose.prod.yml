# ⚠️  Este archivo es solo referencia local.
# En producción, el servicio cms-mcp está integrado en:
#   cms-api/docker-compose.prod.yml
#
# Uso local (sin Traefik):
#   docker compose -f docker-compose.prod.yml up -d

services:
  cms-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-mcp-app
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: 3020
      CMS_API_URL: ${CMS_API_URL:-http://host.docker.internal:3010}
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD}
