# .github/workflows/deploy.yml
# CI/CD — Build, Push a GHCR, Deploy a VPS Hostinger
# El docker-compose.prod.yml con el servicio cms-mcp está en el repo cms-api
# test-trigger: 2026-06-21

name: Deploy MCP

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".env.example"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/macarenonet/cms-mcp:latest
            ghcr.io/macarenonet/cms-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 3m
          command_timeout: 30m
          envs: GHCR_TOKEN,GITHUB_ACTOR,GEMINI_API_KEY,GEMINI_IMAGE_MODEL
          script: |
            set -e
            echo "🚀 Deploying cms-mcp..."
            cd /docker/cms

            # Ensure GEMINI vars in .env (for cms-api image generation)
            if ! grep -q '^GEMINI_API_KEY=' .env 2>/dev/null; then
              echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
              echo "✅ GEMINI_API_KEY added to .env"
            fi
            if ! grep -q '^GEMINI_IMAGE_MODEL=' .env 2>/dev/null; then
              echo "GEMINI_IMAGE_MODEL=$GEMINI_IMAGE_MODEL" >> .env
              echo "✅ GEMINI_IMAGE_MODEL added to .env"
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose pull cms-mcp
            docker compose up -d --no-deps --remove-orphans cms-mcp
            docker logout ghcr.io
            docker system prune -f --filter "until=24h"
            echo "✅ Deploy complete!"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
